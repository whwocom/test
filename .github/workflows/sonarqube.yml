name: SonarCloud Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  pull-requests: read

jobs:
  Analysis:
    runs-on: ubuntu-latest

    steps:
      # 1. 소스코드 체크아웃
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 공식 SonarCloud 전용 액션 구동 (Java 버전 에러가 나지 않는 최신 플러그인)
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          # 여기에 기존 옵션들을 -D 문법으로 주입합니다.
          args: >
            -Dsonar.projectKey=whwocom_test
            -Dsonar.sources=.
            -Dsonar.inclusions=**/*.html,**/pdf.js,**/pdf.worker.js,**/pdf_viewer.css
            -Dsonar.javascript.maxFileSize=20
